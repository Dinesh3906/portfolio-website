<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Messages - Dhavala's Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
            background: linear-gradient(135deg, #00d4ff 0%, #4ecdc4 100%);
            border-radius: 15px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #0a0a0a;
            margin-bottom: 10px;
        }

        .header p {
            color: #333;
            font-size: 1.1rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #333;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00d4ff;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #b0b0b0;
            font-size: 1rem;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn {
            background: linear-gradient(135deg, #00d4ff 0%, #4ecdc4 100%);
            color: #0a0a0a;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .search-box {
            padding: 12px 20px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            width: 300px;
        }

        .contacts-grid {
            display: grid;
            gap: 20px;
        }

        .contact-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 25px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .contact-card:hover {
            transform: translateY(-5px);
            border-color: #00d4ff;
        }

        .contact-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .contact-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #00d4ff;
        }

        .contact-date {
            color: #b0b0b0;
            font-size: 0.9rem;
        }

        .contact-email {
            color: #4ecdc4;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .contact-message {
            background: #111;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #00d4ff;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .contact-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-small {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-reply {
            background: #4ecdc4;
            color: #0a0a0a;
        }

        .btn-delete {
            background: #ff6b6b;
            color: #fff;
        }

        .btn-small:hover {
            transform: translateY(-1px);
        }

        .no-contacts {
            text-align: center;
            padding: 50px;
            color: #b0b0b0;
        }

        .export-section {
            margin-top: 30px;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 15px;
            border: 1px solid #333;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .search-box {
                width: 100%;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>📧 Contact Messages</h1>
            <p>Portfolio Messages Dashboard</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="total-contacts">0</div>
                <div class="stat-label">Total Messages</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="today-contacts">0</div>
                <div class="stat-label">Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="this-week-contacts">0</div>
                <div class="stat-label">This Week</div>
            </div>
        </div>

        <div class="controls">
            <div>
                <button class="btn" onclick="loadContacts()">🔄 Refresh</button>
                <a href="index.html" class="btn">🏠 Back to Portfolio</a>
            </div>
            <input type="text" class="search-box" placeholder="Search messages..." id="search-input">
        </div>

        <div id="contacts-container">
            <div class="no-contacts">Loading messages...</div>
        </div>

        <div class="export-section">
            <h3 style="margin-bottom: 15px; color: #00d4ff;">📊 Export Data</h3>
            <button class="btn" onclick="exportToJSON()">📄 Export as JSON</button>
            <button class="btn" onclick="exportToCSV()">📊 Export as CSV</button>
            <button class="btn btn-delete" onclick="clearAllData()" style="background: #ff6b6b; margin-left: 20px;">🗑️
                Clear All Data</button>
        </div>
    </div>

    <script>
        let allContacts = [];

        // Load contacts from localStorage
        function loadContacts() {
            try {
                const contactsData = localStorage.getItem('portfolioContacts');
                if (contactsData) {
                    allContacts = JSON.parse(contactsData);
                } else {
                    allContacts = [];
                }
                displayContacts(allContacts);
                updateStats(allContacts);
            } catch (error) {
                console.error('Error loading contacts:', error);
                allContacts = [];
                displayContacts([]);
                updateStats([]);
            }
        }

        // Display contacts
        function displayContacts(contacts) {
            const container = document.getElementById('contacts-container');

            if (contacts.length === 0) {
                container.innerHTML = '<div class="no-contacts">No messages yet. Share your portfolio to start receiving contacts!</div>';
                return;
            }

            const contactsHTML = contacts.map(contact => `
                <div class="contact-card">
                    <div class="contact-header">
                        <div class="contact-name">${escapeHtml(contact.name)}</div>
                        <div class="contact-date">${contact.date} at ${contact.time}</div>
                    </div>
                    <div class="contact-email">📧 ${escapeHtml(contact.email)}</div>
                    <div class="contact-message">${escapeHtml(contact.message)}</div>
                    <div class="contact-actions">
                        <button class="btn-small btn-reply" onclick="replyToContact('${contact.email}', '${escapeHtml(contact.name)}')">Reply</button>
                        <button class="btn-small btn-delete" onclick="deleteContact('${contact.id}')">Delete</button>
                    </div>
                </div>
            `).join('');

            container.innerHTML = `<div class="contacts-grid">${contactsHTML}</div>`;
        }

        // Update statistics
        function updateStats(contacts) {
            const today = new Date().toDateString();
            const oneWeekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);

            const todayCount = contacts.filter(c => new Date(c.timestamp).toDateString() === today).length;
            const weekCount = contacts.filter(c => new Date(c.timestamp) >= oneWeekAgo).length;

            document.getElementById('total-contacts').textContent = contacts.length;
            document.getElementById('today-contacts').textContent = todayCount;
            document.getElementById('this-week-contacts').textContent = weekCount;
        }

        // Reply to contact
        function replyToContact(email, name) {
            const subject = `Re: Your message from portfolio`;
            const body = `Hi ${name},\n\nThank you for reaching out through my portfolio.\n\nBest regards,\nDhavala Dinesh Kumar`;
            const mailtoLink = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            window.open(mailtoLink);
        }

        // Delete contact
        function deleteContact(id) {
            if (!confirm('Are you sure you want to delete this message?')) return;

            try {
                allContacts = allContacts.filter(contact => contact.id !== id);
                localStorage.setItem('portfolioContacts', JSON.stringify(allContacts));
                loadContacts(); // Reload display
            } catch (error) {
                console.error('Error deleting contact:', error);
                alert('Error deleting contact');
            }
        }

        // Search functionality
        document.getElementById('search-input').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredContacts = allContacts.filter(contact =>
                contact.name.toLowerCase().includes(searchTerm) ||
                contact.email.toLowerCase().includes(searchTerm) ||
                contact.message.toLowerCase().includes(searchTerm)
            );
            displayContacts(filteredContacts);
        });

        // Export to JSON
        function exportToJSON() {
            const dataStr = JSON.stringify(allContacts, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `portfolio-contacts-${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }

        // Export to CSV
        function exportToCSV() {
            if (allContacts.length === 0) {
                alert('No contacts to export');
                return;
            }

            const headers = ['Name', 'Email', 'Message', 'Date', 'Time'];
            const csvContent = [
                headers.join(','),
                ...allContacts.map(contact => [
                    `"${contact.name}"`,
                    `"${contact.email}"`,
                    `"${contact.message.replace(/"/g, '""')}"`,
                    `"${contact.date}"`,
                    `"${contact.time}"`
                ].join(','))
            ].join('\n');

            const dataBlob = new Blob([csvContent], { type: 'text/csv' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `portfolio-contacts-${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
            URL.revokeObjectURL(url);
        }

        // Clear all data
        function clearAllData() {
            if (!confirm('Are you sure you want to delete ALL messages? This cannot be undone!')) return;

            localStorage.removeItem('portfolioContacts');
            allContacts = [];
            loadContacts();
            alert('All messages have been deleted.');
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load contacts on page load
        loadContacts();

        // Auto-refresh every 30 seconds
        setInterval(loadContacts, 30000);
    </script>
</body>

</html>
