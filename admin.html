<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Messages - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
            background: linear-gradient(135deg, #00d4ff 0%, #4ecdc4 100%);
            border-radius: 15px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #0a0a0a;
            margin-bottom: 10px;
        }

        .header p {
            color: #333;
            font-size: 1.1rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #333;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00d4ff;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #b0b0b0;
            font-size: 1rem;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #00d4ff 0%, #4ecdc4 100%);
            color: #0a0a0a;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
        }

        .search-box {
            padding: 12px 20px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            width: 300px;
        }

        .contacts-grid {
            display: grid;
            gap: 20px;
        }

        .contact-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 25px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .contact-card:hover {
            transform: translateY(-5px);
            border-color: #00d4ff;
        }

        .contact-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .contact-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #00d4ff;
        }

        .contact-date {
            color: #b0b0b0;
            font-size: 0.9rem;
        }

        .contact-email {
            color: #4ecdc4;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .contact-message {
            background: #111;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #00d4ff;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .contact-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-reply {
            background: #4ecdc4;
            color: #0a0a0a;
        }

        .btn-delete {
            background: #ff6b6b;
            color: #fff;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #b0b0b0;
        }

        .no-contacts {
            text-align: center;
            padding: 50px;
            color: #b0b0b0;
        }

        .error {
            background: #ff6b6b;
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .search-box {
                width: 100%;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>📧 Contact Messages</h1>
            <p>Admin Dashboard - Dhavala Dinesh Kumar's Portfolio</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="total-contacts">0</div>
                <div class="stat-label">Total Messages</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="today-contacts">0</div>
                <div class="stat-label">Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="this-week-contacts">0</div>
                <div class="stat-label">This Week</div>
            </div>
        </div>

        <div class="controls">
            <button class="refresh-btn" onclick="loadContacts()">🔄 Refresh</button>
            <input type="text" class="search-box" placeholder="Search messages..." id="search-input">
        </div>

        <div id="error-message"></div>
        <div id="contacts-container">
            <div class="loading">Loading messages...</div>
        </div>
    </div>

    <script>
        let allContacts = [];

        // Load contacts from API
        async function loadContacts() {
            try {
                const response = await fetch('/api/contacts');
                const data = await response.json();

                if (data.success) {
                    allContacts = data.contacts;
                    displayContacts(allContacts);
                    updateStats(allContacts);
                } else {
                    showError('Failed to load contacts: ' + data.error);
                }
            } catch (error) {
                showError('Error loading contacts: ' + error.message);
            }
        }

        // Display contacts
        function displayContacts(contacts) {
            const container = document.getElementById('contacts-container');

            if (contacts.length === 0) {
                container.innerHTML = '<div class="no-contacts">No messages yet. Share your portfolio to start receiving contacts!</div>';
                return;
            }

            const contactsHTML = contacts.map(contact => `
                <div class="contact-card">
                    <div class="contact-header">
                        <div class="contact-name">${escapeHtml(contact.name)}</div>
                        <div class="contact-date">${contact.date} at ${contact.time}</div>
                    </div>
                    <div class="contact-email">📧 ${escapeHtml(contact.email)}</div>
                    <div class="contact-message">${escapeHtml(contact.message)}</div>
                    <div class="contact-actions">
                        <button class="btn btn-reply" onclick="replyToContact('${contact.email}', '${escapeHtml(contact.name)}')">Reply</button>
                        <button class="btn btn-delete" onclick="deleteContact('${contact.id}')">Delete</button>
                    </div>
                </div>
            `).join('');

            container.innerHTML = `<div class="contacts-grid">${contactsHTML}</div>`;
        }

        // Update statistics
        function updateStats(contacts) {
            const today = new Date().toDateString();
            const oneWeekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);

            const todayCount = contacts.filter(c => new Date(c.timestamp).toDateString() === today).length;
            const weekCount = contacts.filter(c => new Date(c.timestamp) >= oneWeekAgo).length;

            document.getElementById('total-contacts').textContent = contacts.length;
            document.getElementById('today-contacts').textContent = todayCount;
            document.getElementById('this-week-contacts').textContent = weekCount;
        }

        // Reply to contact
        function replyToContact(email, name) {
            const subject = `Re: Your message from portfolio`;
            const body = `Hi ${name},\n\nThank you for reaching out through my portfolio.\n\nBest regards,\nDhavala Dinesh Kumar`;
            const mailtoLink = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            window.open(mailtoLink);
        }

        // Delete contact
        async function deleteContact(id) {
            if (!confirm('Are you sure you want to delete this message?')) return;

            try {
                const response = await fetch(`/api/contacts/${id}`, { method: 'DELETE' });
                const data = await response.json();

                if (data.success) {
                    loadContacts(); // Reload contacts
                } else {
                    showError('Failed to delete contact: ' + data.error);
                }
            } catch (error) {
                showError('Error deleting contact: ' + error.message);
            }
        }

        // Search functionality
        document.getElementById('search-input').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredContacts = allContacts.filter(contact =>
                contact.name.toLowerCase().includes(searchTerm) ||
                contact.email.toLowerCase().includes(searchTerm) ||
                contact.message.toLowerCase().includes(searchTerm)
            );
            displayContacts(filteredContacts);
        });

        // Show error message
        function showError(message) {
            document.getElementById('error-message').innerHTML = `<div class="error">${message}</div>`;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Auto-refresh every 30 seconds
        setInterval(loadContacts, 30000);

        // Load contacts on page load
        loadContacts();
    </script>
</body>

</html>
